<video controls></video>

<form onsubmit="loadVideo(event, this)">
  <input type="text" name="link">
  <input type="submit">
</form>

<script type="module">
  import { FFmpegClient } from './dist/ffmpeg-client.js';

  const client = new FFmpegClient({
    workerURL: new URL('./dist/ffmpeg.worker.js', import.meta.url).href
  });

  await client.load();

  async function loadVideo(event, elem) {
    event.preventDefault();

    const response = await fetch(elem["link"].value);
    const buffer = await response.arrayBuffer();

    const mkvBytes = new Uint8Array(buffer);

    const fmp4 = await client.convertFile(mkvBytes);

    const url = URL.createObjectURL(
      new Blob([fmp4], { type: 'video/mp4' })
    );

    document.querySelector('video').src = url;
  }

  window.loadVideo = loadVideo;
</script>
